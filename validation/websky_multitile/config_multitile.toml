# Multi-tile validation run — ntile=2, nmesh=256
#
# Geometry: same tile as 256^3 single-tile validation, 2 tiles per dimension
#   nmesh=256, nbuff=22, ntile=2
#   nsub = 256 - 44 = 212
#   cellsize = 512 / 212 = 2.4151 Mpc/h
#   dL_box = 256 * cellsize = 618.264 Mpc/h (= Julia boxsize, per tile)
#   Total grid: N = 212*2 + 44 = 468
#   Total box: 468 * cellsize = 1130.264 Mpc/h
#
# Usage:
#   julia --project=. -t auto bin/peakpatch.jl validation/websky_multitile/config_multitile.toml --verbose

[cosmology]
Om = 0.3138       # total Omega_matter = Omx + OmB
OB = 0.0493       # Omega_baryon
OL = 0.6862       # Omega_Lambda = 1 - Om
h  = 0.6735       # H0 / (100 km/s/Mpc)

[grid]
n       = 256       # grid cells per tile dimension (= Fortran nmesh = n1)
boxsize = 618.264   # per-tile box extent [Mpc/h] (= Fortran dL_box)
nbuff   = 22        # buffer cells per side

[run]
z_out     = 0.0
ilpt      = 2
seed      = 13579
ntile     = 2
use_mpi   = false
merge     = false    # no merger for raw comparison
ioutshear = 0
wsmooth   = 1       # top-hat
rmax2rs   = 0.0
NonGauss  = 0
fNL       = 0.0
generate_table = true
ode_solver = "diffeq"
use_lcg = true
fortran_compat = true

[files]
pk         = "validation/websky_small/pk_fortran_direct.dat"
filterbank = "validation/websky_small/fortran_run/filter.dat"
homeltab   = "validation/websky_small/HomelTab_matched.dat"
output     = "catalog_multitile.pksc"

[output]
format = "pksc"
path   = "validation/websky_multitile/output_multitile"
